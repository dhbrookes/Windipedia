# Windipedia local development stack
#
# Usage:
#   docker-compose up          # start both frontend and backend
#   docker-compose up backend  # backend only
#   docker-compose logs -f     # follow logs
#
# Prerequisites:
#   - Copy .env.example to .env and fill in VITE_MAPBOX_TOKEN
#   - Set USE_PLACEHOLDER_TILES=true in .env to skip GCS (recommended for first run)

version: "3.9"

services:
  # ------------------------------------------------------------------
  # Frontend — React/Vite dev server with HMR
  # ------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      # Mount source for hot-module replacement
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
    environment:
      - VITE_MAPBOX_TOKEN=${VITE_MAPBOX_TOKEN}
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - windipedia

  # ------------------------------------------------------------------
  # Backend — FastAPI + uvicorn
  # ------------------------------------------------------------------
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PORT=8000
      - ENVIRONMENT=development
    networks:
      - windipedia
    # Mount credentials file if GOOGLE_APPLICATION_CREDENTIALS is set
    # volumes:
    #   - ${GOOGLE_APPLICATION_CREDENTIALS:-/dev/null}:/gcp/key.json:ro
    # environment:
    #   - GOOGLE_APPLICATION_CREDENTIALS=/gcp/key.json

networks:
  windipedia:
    driver: bridge
